
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إحسان - إدارة التبرعات والمشاريع الخيرية</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --green-dark: #0F5132;
  --green-light: #198754;
  --gold: #D4AF37;
  --white: #ffffff;
  --bg-main: #f0f4f0;
  --sidebar-width: 260px;
  --text-dark: #1a2e1a;
  --text-muted: #6c7a6c;
  --card-shadow: 0 2px 12px rgba(15,81,50,0.10);
  --border-color: #d0e4d0;
  --danger: #dc3545;
  --warning: #ffc107;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Cairo', sans-serif;
  background: var(--bg-main);
  color: var(--text-dark);
  min-height: 100vh;
}

/* ===== AUTH ===== */
#auth-screen {
  min-height: 100vh;
  background: linear-gradient(135deg, var(--green-dark) 0%, #1a4a2e 60%, #0a2a1a 100%);
  display: flex;
  align-items: center;
  justify-content: center;
}
.auth-card {
  background: white;
  border-radius: 20px;
  padding: 48px 40px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.auth-logo {
  text-align: center;
  margin-bottom: 32px;
}
.auth-logo .logo-icon {
  width: 72px; height: 72px;
  background: linear-gradient(135deg, var(--green-dark), var(--green-light));
  border-radius: 20px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 12px;
  font-size: 32px;
  color: white;
}
.auth-logo h1 { font-size: 28px; font-weight: 800; color: var(--green-dark); }
.auth-logo p { color: var(--text-muted); font-size: 14px; }
.auth-input {
  width: 100%;
  padding: 12px 16px;
  border: 1.5px solid var(--border-color);
  border-radius: 10px;
  font-family: 'Cairo', sans-serif;
  font-size: 15px;
  margin-bottom: 14px;
  transition: border-color 0.2s;
  background: #fafafa;
}
.auth-input:focus { outline: none; border-color: var(--green-light); background: white; }
.btn-login {
  width: 100%;
  padding: 13px;
  background: var(--green-dark);
  color: white;
  border: none;
  border-radius: 10px;
  font-family: 'Cairo', sans-serif;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
}
.btn-login:hover { background: var(--green-light); }
.btn-login:active { transform: scale(0.99); }
.auth-error {
  background: #fff0f0;
  color: #c0392b;
  border: 1px solid #f5c6cb;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 14px;
  margin-bottom: 14px;
  display: none;
}

/* ===== LAYOUT ===== */
#app { display: flex; min-height: 100vh; }
.sidebar {
  width: var(--sidebar-width);
  background: var(--green-dark);
  position: fixed;
  top: 0; right: 0;
  height: 100vh;
  overflow-y: auto;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  transition: transform 0.3s;
}
.sidebar-logo {
  padding: 24px 20px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  display: flex;
  align-items: center;
  gap: 12px;
}
.sidebar-logo .logo-box {
  width: 42px; height: 42px;
  background: var(--gold);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  color: var(--green-dark);
  font-weight: 800;
  flex-shrink: 0;
}
.sidebar-logo h2 { color: white; font-size: 20px; font-weight: 800; }
.sidebar-logo p { color: rgba(255,255,255,0.6); font-size: 11px; }
.sidebar-nav { padding: 16px 12px; flex: 1; }
.nav-section { margin-bottom: 8px; }
.nav-section-title {
  color: rgba(255,255,255,0.4);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 8px 10px 4px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 10px;
  color: rgba(255,255,255,0.75);
  cursor: pointer;
  transition: all 0.2s;
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 2px;
  text-decoration: none;
}
.nav-item i { font-size: 18px; width: 22px; text-align: center; }
.nav-item:hover { background: rgba(255,255,255,0.1); color: white; }
.nav-item.active { background: var(--green-light); color: white; font-weight: 700; }
.nav-item.active i { color: white; }
.sidebar-user {
  padding: 16px;
  border-top: 1px solid rgba(255,255,255,0.1);
  display: flex;
  align-items: center;
  gap: 10px;
}
.user-avatar {
  width: 38px; height: 38px;
  background: var(--gold);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800;
  color: var(--green-dark);
  font-size: 14px;
  flex-shrink: 0;
}
.user-info { flex: 1; }
.user-info .name { color: white; font-size: 13px; font-weight: 700; }
.user-info .role { color: rgba(255,255,255,0.5); font-size: 11px; }
.btn-logout {
  background: rgba(255,255,255,0.1);
  border: none;
  color: rgba(255,255,255,0.7);
  border-radius: 8px;
  padding: 6px 8px;
  cursor: pointer;
  font-size: 16px;
  transition: all 0.2s;
}
.btn-logout:hover { background: rgba(220,53,69,0.3); color: white; }

/* ===== MAIN CONTENT ===== */
.main-content {
  margin-right: var(--sidebar-width);
  flex: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
.topbar {
  background: white;
  padding: 0 28px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border-color);
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.topbar h3 { font-size: 18px; font-weight: 700; color: var(--green-dark); }
.topbar-actions { display: flex; align-items: center; gap: 10px; }
.search-bar {
  display: flex;
  align-items: center;
  background: var(--bg-main);
  border: 1.5px solid var(--border-color);
  border-radius: 10px;
  padding: 6px 14px;
  gap: 8px;
  transition: border-color 0.2s;
}
.search-bar:focus-within { border-color: var(--green-light); }
.search-bar input {
  border: none;
  background: transparent;
  font-family: 'Cairo', sans-serif;
  font-size: 14px;
  width: 200px;
  outline: none;
}
.search-bar i { color: var(--text-muted); }
.page-content {
  padding: 28px;
  flex: 1;
}

/* ===== CARDS ===== */
.card {
  background: white;
  border-radius: 14px;
  border: 1px solid var(--border-color);
  box-shadow: var(--card-shadow);
  overflow: hidden;
}
.card-header {
  padding: 18px 22px;
  border-bottom: 1px solid var(--border-color);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #fafcfa;
}
.card-header h5 {
  font-size: 16px;
  font-weight: 700;
  color: var(--green-dark);
  margin: 0;
  display: flex;
  align-items: center;
  gap: 8px;
}
.card-body { padding: 22px; }

/* ===== STAT CARDS ===== */
.stat-card {
  background: white;
  border-radius: 14px;
  border: 1px solid var(--border-color);
  padding: 20px 22px;
  box-shadow: var(--card-shadow);
  display: flex;
  align-items: center;
